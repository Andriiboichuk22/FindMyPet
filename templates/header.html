<header class="site-header">
    <div class="site-header__inner">
        <a href="{{ url_for('home') }}" class="site-brand" aria-label="FindMyPet - на головну">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo" alt="FindMyPet">
            <span class="site-brand__text">FindMyPet</span>
        </a>

        <button
            type="button"
            class="site-nav-toggle"
            aria-expanded="false"
            aria-controls="site-nav"
            aria-label="Відкрити меню"
        >
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav id="site-nav" class="site-nav" aria-label="Основна навігація">
            <a class="site-nav__link" href="{{ url_for('home') }}">Оголошення</a>
            <a class="site-nav__link site-nav__link--accent" href="{{ url_for('add') }}">Додати оголошення</a>

            {% if user %}
            {% if current_user and current_user.is_admin %}
            <a class="site-nav__link" href="{{ url_for('admin_panel') }}">Адмінка</a>
            {% endif %}
            <a class="site-nav__user" href="{{ url_for('cabinet') }}">{{ user }}</a>
            <a class="site-nav__link" href="{{ url_for('logout') }}">Вийти</a>
            {% else %}
            <a class="site-nav__link" href="{{ url_for('login') }}">Вхід</a>
            <a class="site-nav__link" href="{{ url_for('register') }}">Реєстрація</a>
            {% endif %}
        </nav>
    </div>
</header>
<script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
