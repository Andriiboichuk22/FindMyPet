<header class="site-header">
    <div class="site-header__inner">
        <a href="{{ url_for('home') }}" class="site-brand" aria-label="FindMyPet - на головну">
            <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo" alt="FindMyPet">
            <span class="site-brand__text">FindMyPet</span>
        </a>

        <nav class="site-nav" aria-label="Основна навігація">
            <a class="site-nav__link" href="{{ url_for('home') }}">Оголошення</a>
            <a class="site-nav__link site-nav__link--accent" href="{{ url_for('add') }}">Додати оголошення</a>

            {% if user %}
            <span class="site-nav__user">{{ user }}</span>
            <a class="site-nav__link" href="/logout">Вийти</a>
            {% else %}
            <a class="site-nav__link" href="{{ url_for('login') }}">Вхід</a>
            <a class="site-nav__link" href="{{ url_for('register') }}">Реєстрація</a>
            {% endif %}
        </nav>
    </div>
</header>
