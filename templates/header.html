<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<header>
    <a href="{{ url_for('home') }}">
        <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">
    </a>

    <div>
        <form action="{{ url_for('add') }}" method="get">
            <button type="submit">Додати оголошення</button>
        </form>

        {% if user %}
        <div class="fl-col">
            <a href="/cabinet">{{ user }}</a>
            <a href="/logout">Вийти</a></div>
        {% else %}
        <div class="fl-col">
            <a href="{{ url_for('login') }}">Вхід</a>
            <a href="{{ url_for('register') }}">Реєстрація</a></div>
        {% endif %}
    </div>
</header>
